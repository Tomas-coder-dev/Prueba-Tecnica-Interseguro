version: '3.8'

services:
  node-api:
    build: ./node-api
    ports:
      - "3000:3000"
    restart: always

  go-api:
    build: ./go-api
    ports:
      - "8080:8080"
    environment:
      - NODE_URL=http://node-api:3000/statistics
    depends_on:
      - node-api
    restart: always

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - go-api
    restart: always